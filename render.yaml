services:
  - type: web
    name: ai-document-qa-service
    env: docker
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: LLM_PROVIDER
        value: gemini
      - key: EMBEDDING_PROVIDER
        value: gemini
      - key: VECTOR_DB
        value: pgvector
      - key: GEMINI_API_KEY
        sync: false
